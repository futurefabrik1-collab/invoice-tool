name: invoice-tool
region: fra
services:
  - name: web
    github:
      repo: YOUR_USERNAME/invoice-tool
      branch: main
      deploy_on_push: true
    
    build_command: |
      pip install -r requirements.txt
      cd frontend && npm install && npm run build
    
    run_command: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 backend.app:app
    
    environment_slug: python
    
    envs:
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: FLASK_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "8080"
        scope: RUN_TIME
    
    instance_count: 1
    instance_size_slug: basic-xxs
    
    http_port: 8080
    
    routes:
      - path: /
    
    health_check:
      http_path: /api/health
      initial_delay_seconds: 60
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
